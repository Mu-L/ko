name: Do Not Submit

on:
  pull_request:
    branches: ['main']

permissions: {}

jobs:
  donotsubmit:
    name: Do Not Submit
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
    - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      with:
        persist-credentials: false

    - uses: chainguard-dev/actions/donotsubmit@fabe4ed3f66ceb5f8ec86ed7ae6d0c945ca362fb # main
